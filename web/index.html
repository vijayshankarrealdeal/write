<!DOCTYPE html>
<html>
<head>
 <script>
    (async function() {
      // ⚠️ Change this string ONLY when you want to force all users to refresh globally
      const APP_VERSION = "1.0.1"; 
      
      try {
        const currentVersion = localStorage.getItem("app_version");
        if (currentVersion !== APP_VERSION) {
          
          // 1. Force kill stuck Service Workers
          if ('serviceWorker' in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            for (let reg of registrations) {
              await reg.unregister();
            }
          }
          
          // 2. Completely wipe the browser's old stored files
          if ('caches' in window) {
            const keys = await caches.keys();
            for (let key of keys) {
              await caches.delete(key);
            }
          }
          
          // 3. Record the new version so this only runs once per update
          localStorage.setItem("app_version", APP_VERSION);
          
          // 4. Force hard reload from server
          const newUrl = window.location.origin + window.location.pathname + "?v=" + new Date().getTime() + window.location.hash;
          window.location.replace(newUrl);
        }
      } catch (e) { console.error("Auto-update failed:", e); }
    })();
  </script>

<body>
  <script>
    // Force service worker update on every visit so new deploys are picked up immediately.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for (var reg of registrations) {
          reg.update();
        }
      });
    }
  </script>
