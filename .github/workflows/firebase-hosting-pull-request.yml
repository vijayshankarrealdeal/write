name: Deploy to Firebase Hosting on PR
on: pull_request
jobs:
  build_and_preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: {channel: 'stable', cache: true}
      - run: flutter pub get
      - run: |
                flutter build web --release --base-href "/" --pwa-strategy=none --dart-define=BUILD_SHA=${{ github.sha }}
                sed -i 's/__BUILD_SHA__/${{ github.sha }}/g' build/web/index.html
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BOOKY_4EB2C }}
          projectId: booky-4eb2c